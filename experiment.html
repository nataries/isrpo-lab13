<!doctype html>
<html lang="ru-RU">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Эксперимент с Bootstrap</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384
sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="custom.css" />
  </head>

  <body>
    <div>
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
          <div class="card shadow-lg" style="width: 18rem">
            <img src="img/desktop.png" class="card-img-top" alt="Desktop" />
            <span class="badge text-bg-warning">★★★★☆4.5</span>
            <div class="card-body">
              <h5 class="card-title">Игровой ноутбук</h5>
              <p class="card-text">Мощный ноутбук для работы и игр</p>
              <h1>89 990 ₽</h1>
              <a href="#" class="btn btn-primary">Подробнее</a>
              <br /><br />
              <button type="button" class="btn w-100 btn-success">Купить</button>
            </div>
          </div>
        </div>

        <div class="col-md-6 col-lg-4">
          <div class="card shadow-lg" style="width: 18rem">
            <img src="img/macbook.png" class="card-img-top" alt="Tablet" />
            <span class="badge text-bg-danger">★★★☆☆3.1</span>
            <div class="card-body">
              <h5 class="card-title">Macbook</h5>
              <p class="card-text">Компактный и производительный ноутбук для каждого.</p>
              <h1>79 990 ₽</h1>
              <a href="#" class="btn btn-primary">Подробнее</a>
              <br /><br />
              <button type="button" class="btn w-100 btn-success">Купить</button>
            </div>
          </div>
        </div>

        <div class="col-md-6 col-lg-4">
          <div class="card shadow-lg" style="width: 18rem">
            <img src="img/iphone.png" class="card-img-top" alt="Mobile" />
            <span class="badge text-bg-success">★★★★★5</span>
            <div class="card-body">
              <h5 class="card-title">iPhone 15</h5>
              <p class="card-text">Смартфон компании Apple, вышедший в 2023 году.</p>
              <h1>45 990 ₽</h1>
              <a href="#" class="btn btn-primary">Подробнее</a>
              <br /><br />
              <button type="button" class="btn w-100 btn-success">Купить</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384
FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    >
  </script>
  </body>
</html>
